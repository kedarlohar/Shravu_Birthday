<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#150f28">
    <title>Shravu 💖</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-mid:    #241a3d;
            --bg-deep:   #150f28;
            --bg-edge:   #08060f;
            --ink:       #f6e9ee;
            --rose:      #e8b4c8;
            --gold:      #d9a869;
            --glow:      rgba(232, 180, 200, 0.45);
            --glow-soft: rgba(217, 168, 105, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(ellipse at 50% 32%, var(--bg-mid) 0%, var(--bg-deep) 48%, var(--bg-edge) 100%);
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 4; pointer-events: none;
            box-shadow: inset 0 0 18vw rgba(0,0,0,0.55);
        }

        #starCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .scene { position: absolute; inset: 0; z-index: 2;
                 display: flex; justify-content: center; align-items: center; }

        .title {
            position: absolute; top: 9%; left: 0; right: 0; z-index: 50;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; font-weight: 500;
            font-size: clamp(1.9rem, 6.5vw, 2.7rem);
            letter-spacing: 0.05em;
            color: var(--ink);
            text-shadow: 0 0 20px var(--glow), 0 2px 12px rgba(0,0,0,0.55);
            opacity: 0; transform: translateY(-10px);
            transition: opacity 1.1s ease, transform 1.1s ease;
        }
        .title.show { opacity: 1; transform: translateY(0); }

        .heart { position: relative; width: 1px; height: 1px; }
        .heart.formed { animation: beat 2.6s ease-in-out infinite; }
        @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.035); } }

        .card {
            position: absolute; left: 0; top: 0;
            border-radius: 13px;
            overflow: hidden;
            background: #1b1b22;
            opacity: 0;
            border: 3px solid #fff;                 /* white border */
            box-shadow:
                0 8px 22px rgba(0,0,0,0.4),
                0 0 10px rgba(255, 182, 213, 0.85),  /* lite pink glow (baher) */
                0 0 22px rgba(255, 130, 190, 0.55),
                inset 0 0 8px rgba(255, 190, 220, 0.5);  /* aat halka pink */
            transition: transform 1.05s cubic-bezier(0.22, 0.9, 0.32, 1), opacity 0.5s ease;
            will-change: transform, opacity;
        }
        .card::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(155deg, rgba(255,255,255,0.20), rgba(255,255,255,0) 42%);
            pointer-events: none;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .hint {
            position: absolute; bottom: 7%; z-index: 50;
            font-family: 'Poppins', sans-serif; font-weight: 300;
            color: rgba(246, 233, 238, 0.8); font-size: 0.85rem; letter-spacing: 0.6px;
            text-shadow: 0 0 12px var(--glow-soft);
            opacity: 0; transition: opacity 0.7s ease;
        }
        .hint.show { opacity: 1; animation: bob 1.6s ease-in-out infinite; }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .floaty-heart {
            position: absolute; z-index: 3; font-size: 1.15rem;
            filter: drop-shadow(0 0 6px var(--glow-soft));
            animation: floatUp 7.5s linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(20px) scale(0.8); opacity: 0; }
            15%  { opacity: 0.75; }
            85%  { opacity: 0.75; }
            100% { transform: translateY(-130px) scale(1.05); opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card { transition: opacity 0.5s ease; }
            .heart.formed { animation: none; }
            .hint.show { animation: none; }
            .floaty-heart { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>
    <div class="title" id="title">Shravu</div>
    <div class="scene"><div class="heart" id="heart"></div></div>
    <div class="hint" id="hint">tap to replay 💖</div>

    <script>
        // =========================================================
        // PHOTOS -> ithe add / badla (kami astilya repeat hotil)
        // =========================================================
        const PHOTOS = ['pic1.jpg', 'pic2.jpg', 'pic3.jpg', 'pic4.jpg', 'pic5.jpg'];

        const heart = document.getElementById('heart');
        const hint  = document.getElementById('hint');
        const title = document.getElementById('title');

        function photoFallback(){
            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
                `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>
                   <rect width='100%' height='100%' fill='#e7ddca'/>
                   <text x='50%' y='58%' font-size='40' text-anchor='middle'>🖼️</text>
                 </svg>`);
        }

        // ---- SINGLE-FILE RAIL along a proper heart curve ----
        function buildHeart() {
            heart.innerHTML = '';
            const heartW = Math.min(window.innerWidth * 0.82, window.innerHeight * 0.6, 460);

            const STEPS = 140;
            const outline = [];
            for (let i = 0; i <= STEPS; i++) {
                const t = (i / STEPS) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                outline.push({ x, y });
            }
            let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
            outline.forEach(p => {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
            });
            const rawW = maxX - minX, rawH = maxY - minY;
            const midX = (minX + maxX) / 2, midY = (minY + maxY) / 2;
            const scale = heartW / rawW;

            const CARD_COUNT = 30;
            const cardSize = heartW * 0.17;

            const cells = [];
            for (let i = 0; i < CARD_COUNT; i++) {
                const t = Math.PI + (i / CARD_COUNT) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                cells.push({ x: (x - midX) * scale, y: -(y - midY) * scale });
            }

            const cards = [];
            cells.forEach((cell, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.width = cardSize + 'px';
                card.style.height = cardSize + 'px';
                card.style.marginLeft = (-cardSize/2) + 'px';
                card.style.marginTop  = (-cardSize/2) + 'px';
                card.style.zIndex = i;

                const img = document.createElement('img');
                img.src = PHOTOS[i % PHOTOS.length];
                img.addEventListener('error', () => img.src = photoFallback());
                card.appendChild(img);

                card.dataset.tx = cell.x;
                card.dataset.ty = cell.y;
                card.dataset.rot = (Math.random()*14 - 7).toFixed(1);

                const prev = cells[i - 1] || cell;
                card.dataset.px = prev.x;
                card.dataset.py = prev.y;
                card.style.transform = `translate(${prev.x}px, ${prev.y}px) scale(0.3) rotate(0deg)`;
                heart.appendChild(card);
                cards.push(card);
            });
            return cards;
        }

        function animate(cards) {
            heart.classList.remove('formed');
            hint.classList.remove('show');
            title.classList.remove('show');

            cards.forEach(c => {
                c.style.transitionDelay = '0ms';
                c.style.opacity = '0';
                c.style.transform = `translate(${c.dataset.px}px, ${c.dataset.py}px) scale(0.3) rotate(0deg)`;
            });

            const stagger = 85;
            requestAnimationFrame(() => requestAnimationFrame(() => {
                cards.forEach((c, i) => {
                    c.style.transitionDelay = (i * stagger) + 'ms';
                    c.style.opacity = '1';
                    c.style.transform =
                        `translate(${c.dataset.tx}px, ${c.dataset.ty}px) scale(1) rotate(${c.dataset.rot}deg)`;
                });
                const total = cards.length * stagger + 950;
                setTimeout(() => {
                    heart.classList.add('formed');
                    hint.classList.add('show');
                    title.classList.add('show');
                    startHearts();
                }, total);
            }));
        }

        let cards = buildHeart();
        animate(cards);

        window.addEventListener('click', () => animate(cards));
        window.addEventListener('touchend', () => animate(cards), {passive:true});
        window.addEventListener('resize', () => { cards = buildHeart(); animate(cards); });

        // ===== STARS =====
        const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function makeStars(){ const count=Math.floor((canvas.width*canvas.height)/6200); const s=[];
            for(let i=0;i<count;i++) s.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,
                r:Math.random()*1.5+0.4,baseAlpha:Math.random()*0.45+0.28,amp:Math.random()*0.45+0.18,
                speed:Math.random()*0.002+0.001,phase:Math.random()*Math.PI*2}); return s; }
        let stars = makeStars();
        function drawStars(t){ ctx.clearRect(0,0,canvas.width,canvas.height);
            for(const s of stars){ let a=s.baseAlpha+s.amp*Math.sin(t*s.speed+s.phase); a=Math.max(0,Math.min(1,a));
                ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(250,240,244,${a})`;
                ctx.shadowBlur=6; ctx.shadowColor='rgba(232,180,200,0.7)'; ctx.fill(); }
            requestAnimationFrame(drawStars); }
        requestAnimationFrame(drawStars);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = makeStars();
        });

        // ===== FLOATING HEARTS (soft, occasional - not cluttered) =====
        let heartTimer = null;
        function startHearts(){ if (heartTimer) return; const emojis=['💗','💕','❤️'];
            heartTimer = setInterval(()=>{ const h=document.createElement('div'); h.className='floaty-heart';
                h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
                h.style.left=Math.random()*90+5+'vw'; h.style.bottom='5%';
                h.style.animationDuration=(Math.random()*3+5.5)+'s';
                document.body.appendChild(h); setTimeout(()=>h.remove(),8500); }, 1300); }
    </script>
</body>
</html>
