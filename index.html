<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Countdown Intro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Text maghcha dark glow -> text clear disto */
        .center-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 92vw; max-width: 720px; height: 46vh;
            z-index: 2; pointer-events: none;
            background: radial-gradient(ellipse at center,
                        rgba(0,0,0,0.85) 0%,
                        rgba(0,0,0,0.62) 42%,
                        rgba(0,0,0,0) 72%);
            filter: blur(8px);
        }

        .overlay-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 3;                       /* glow chya var */
            pointer-events: none; text-align: center;
        }

        .countdown-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            color: #ff69b4;
            font-size: clamp(3.5rem, 16vw, 7rem);
            line-height: 1.1;
            /* Dark contrast + pink glow -> spashṭ disto */
            text-shadow: 0 2px 10px rgba(0,0,0,0.9),
                         0 0 12px #ffd0e8,
                         0 0 24px #ff1493,
                         0 0 46px #ff007f;
            transition: font-size 0.2s ease-in-out;
            animation: pulse 1s infinite alternate;
        }
        .countdown-text.word { font-size: clamp(1.8rem, 10vw, 4.6rem); }

        .countdown-text svg { filter: drop-shadow(0 0 14px #ff1493) drop-shadow(0 0 28px #ff007f); }

        @keyframes pulse { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div class="center-glow"></div>

    <div class="overlay-container">
        <h1 id="display-text" class="countdown-text">3</h1>
    </div>

    <script>
        // ========== 1. MATRIX EFFECT ==========
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Naav pan aksharamध्ये -> HAPPY BIRTHDAY SHRAVU
        const alphabet = "HAPPYBIRTHDAYSHRAVU";

        const darkPinks = ['#99004d', '#b3005c', '#cc0066', '#e60073'];
        const litePinks = ['#ff1a8c', '#ff4da6', '#ff80bf', '#ffb3d9'];
        const allPinks  = darkPinks.concat(litePinks);

        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let rainDrops = [];
        for (let x = 0; x < columns; x++) rainDrops[x] = Math.floor(Math.random() * canvas.height / fontSize);

        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

        const drawMatrix = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold ' + fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                const x = i * fontSize;
                const y = rainDrops[i] * fontSize;

                ctx.fillStyle = rand(allPinks);
                ctx.fillText(text, x, y);

                if (Math.random() > 0.86) { ctx.fillStyle = '#ffe0f0'; ctx.fillText(text, x, y); }

                if (y > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(drawMatrix, 40);

        // ========== 2. PIXEL HEART ==========
        function pixelHeartSVG(cells, pixel, color) {
            let rects = "";
            for (let j = 0; j < cells; j++) {
                for (let i = 0; i < cells; i++) {
                    const x = ((i + 0.5) / cells) * 2.6 - 1.3;
                    const y = 1.35 - ((j + 0.5) / cells) * 2.55;
                    const v = Math.pow(x*x + y*y - 1, 3) - x*x * y*y*y;
                    if (v <= 0) rects += `<rect x="${i*pixel}" y="${j*pixel}" width="${pixel}" height="${pixel}" fill="${color}"/>`;
                }
            }
            const size = cells * pixel;
            return `<svg width="${size}" height="${size}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
        }

        // ========== 3. COUNTDOWN & WISH ==========
        const displayText = document.getElementById('display-text');
        const textSequence = ["3", "2", "1", "Happy", "Birthday", "Shravu", "❤️"];
        let currentIndex = 0;
        const HEART_CELLS = 34, HEART_PIXEL = 5;

        const changeText = () => {
            currentIndex++;
            if (currentIndex < textSequence.length) {
                const val = textSequence[currentIndex];
                if (val === "❤️") {
                    displayText.classList.remove('word');
                    displayText.innerHTML = pixelHeartSVG(HEART_CELLS, HEART_PIXEL, '#ff4da6');
                } else {
                    displayText.innerText = val;
                    displayText.classList.toggle('word', isNaN(val));
                }
            } else {
                clearInterval(sequenceInterval);
                displayText.classList.remove('word');
                displayText.innerHTML = pixelHeartSVG(HEART_CELLS, HEART_PIXEL, '#ff4da6');
                setTimeout(() => { window.location.href = 'page2.html'; }, 2500);
            }
        };
        const sequenceInterval = setInterval(changeText, 1200);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            rainDrops = [];
            for (let x = 0; x < columns; x++) rainDrops[x] = Math.floor(Math.random() * canvas.height / fontSize);
        });
    </script>
</body>
</html>
