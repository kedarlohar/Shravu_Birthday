<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Dark navy background (image sarkha) */
            background: radial-gradient(circle at 50% 40%, #12123a 0%, #08081c 55%, #030310 100%);
            font-family: sans-serif;
        }

        /* Stars canvas back-la */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* GIF center la */
        .gif-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .birthday-gif {
            width: clamp(220px, 55vw, 420px);
            height: auto;
            /* GIF la halka glow */
            filter: drop-shadow(0 0 25px rgba(255, 200, 80, 0.35));
            animation: floaty 3.5s ease-in-out infinite;
        }

        /* GIF thoda var-khali tarangel (soft float) */
        @keyframes floaty {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }

        /* Jar GIF sapadla nahi tar he message distil */
        .fallback {
            color: #ffd166;
            font-size: 1rem;
            text-align: center;
            padding: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="gif-container">
        <!-- GitHub var host kelela GIF (raw URL) -->
        <img id="gif" class="birthday-gif"
             src="birthday.gif"
             alt="Happy Birthday">
    </div>

    <script>
        // ==========================================
        // TWINKLING STARS
        // ==========================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Star density (screen area nusar count)
        function makeStars() {
            const count = Math.floor((canvas.width * canvas.height) / 6000);
            const stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.6 + 0.4,       // size
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    amp: Math.random() * 0.5 + 0.2,      // twinkle strength
                    speed: Math.random() * 0.002 + 0.001,
                    phase: Math.random() * Math.PI * 2
                });
            }
            return stars;
        }
        let stars = makeStars();

        function drawStars(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const s of stars) {
                // Alpha sin wave ne chamakto (twinkle)
                let a = s.baseAlpha + s.amp * Math.sin(t * s.speed + s.phase);
                a = Math.max(0, Math.min(1, a));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }
        requestAnimationFrame(drawStars);

        // Resize var punha set
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = makeStars();
        });

        // GIF na sapadlyas fallback message
        document.getElementById('gif').addEventListener('error', function () {
            const c = document.querySelector('.gif-container');
            c.innerHTML = '<div class="fallback">🎂 Ithe tumcha GIF yeil.<br>File cha naav <b>birthday.gif</b> thevun page2.html sobat theva.</div>';
        });

        // ==========================================
        // Tap / swipe-up kel ki page 3 open
        // ==========================================
        function goNext() { window.location.href = 'page3.html'; }

        document.body.addEventListener('click', goNext);

        let sy = null;
        window.addEventListener('touchstart', (e) => { sy = e.touches[0].clientY; }, {passive:true});
        window.addEventListener('touchend', (e) => {
            if (sy === null) return;
            if (sy - e.changedTouches[0].clientY > 50) goNext();  // swipe up
            sy = null;
        }, {passive:true});

        // "Tap to continue" halka hint
        const hint = document.createElement('div');
        hint.textContent = 'tap to continue →';
        hint.style.cssText = 'position:absolute;bottom:6%;left:0;right:0;text-align:center;z-index:3;color:#ffd6ec;font-family:sans-serif;font-size:0.9rem;opacity:0.8;animation:floaty 2s ease-in-out infinite;';
        document.body.appendChild(hint);
    </script>
</body>
</html>
